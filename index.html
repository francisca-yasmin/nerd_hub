<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NerdHub — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="styles/index.css">
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav>
  <a href="index.html" class="nav-logo">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="18" r="9" stroke="#7c6aff" stroke-width="2.5"/>
      <circle cx="24" cy="18" r="9" stroke="#ff6a9b" stroke-width="2.5"/>
    </svg>
  </a>

  <ul class="nav-links"></ul>

  <div class="nav-actions">
    <button class="btn-logout" onclick="location.href='login.html'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </div>
</nav>

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-bg"></div>

  <!-- Orbes de luz -->
  <div class="hero-orb hero-orb-1"></div>
  <div class="hero-orb hero-orb-2"></div>
  <div class="hero-orb hero-orb-3"></div>

  <!-- Pontos flutuantes gerados via JS -->
  <canvas class="hero-dots" id="hero-canvas"></canvas>

  <!-- Texto hero -->
  <div class="hero-content">
    <p class="hero-eyebrow">✦ Em destaque esta semana</p>
    <h2 class="hero-title">Explore reviews de<br><span>anime & mangá</span></h2>
  </div>

  <!-- Gradiente de saída -->
  <div class="hero-fade"></div>
</section>

<!-- ══ MAIN ══ -->
<main>
  <div class="section-header">
    <h2 class="section-title">Feed</h2>
    <span class="section-count">128 reviews recentes</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="anime">Anime</button>
    <button class="filter-btn" data-filter="manga">Mangá</button>
    <button class="filter-btn" data-filter="filme">Filme</button>
  </div>

  <div class="feed-grid" id="feed-grid"></div>
</main>

<script src="scripts/index.js"></script>

</body>
</html>
