  <link rel="stylesheet" href="styles/index.css">
</head>
<body>

  <div class="nav-actions">

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-bg"></div>

  <!-- Orbes de luz -->
  <div class="hero-orb hero-orb-1"></div>
  <div class="hero-orb hero-orb-2"></div>
  <div class="hero-orb hero-orb-3"></div>

  <!-- Partículas geradas via JS -->
  <div class="hero-particles" id="particles"></div>

  <!-- Cena SVG com silhuetas -->
  <div class="hero-scene">
    <svg viewBox="0 0 960 340" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
      <!-- Chão -->
      <rect x="0" y="300" width="960" height="40" fill="#0d0010" opacity="0.6"/>

      <!-- Silhuetas de personagens (simplified) -->
      <!-- Personagem 1 - esquerda -->
      <g opacity="0.6" transform="translate(80, 180)">
        <ellipse cx="12" cy="0" rx="8" ry="10" fill="#1a0a3a"/>
        <rect x="5" y="10" width="14" height="30" rx="3" fill="#1a0a3a"/>
        <rect x="3" y="13" width="6" height="22" rx="2" fill="#1a0a3a"/>
        <rect x="15" y="13" width="6" height="22" rx="2" fill="#1a0a3a"/>
        <rect x="6" y="40" width="7" height="20" rx="2" fill="#1a0a3a"/>
        <rect x="11" y="40" width="7" height="20" rx="2" fill="#1a0a3a"/>
      </g>

      <!-- Livro aberto com aura -->
      <g transform="translate(130, 140)">
        <ellipse cx="40" cy="80" rx="50" ry="15" fill="#7c2bff" opacity="0.15" filter="url(#glow)"/>
        <path d="M0 60 Q40 20 80 60 L80 100 Q40 80 0 100 Z" fill="#2a1060" stroke="#7c6aff" stroke-width="1"/>
        <path d="M40 20 L40 100" stroke="#7c6aff" stroke-width="1" opacity="0.6"/>
        <!-- Páginas -->
        <path d="M5 62 Q20 50 38 60" stroke="#a89fff" stroke-width="0.8" fill="none" opacity="0.7"/>
        <path d="M5 68 Q20 56 38 66" stroke="#a89fff" stroke-width="0.8" fill="none" opacity="0.5"/>
        <path d="M75 62 Q60 50 42 60" stroke="#a89fff" stroke-width="0.8" fill="none" opacity="0.7"/>
        <!-- Aura do livro -->
        <path d="M40 20 L20 -30 M40 20 L60 -35 M40 20 L40 -40" stroke="#7c6aff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
      </g>

      <!-- Relâmpago no centro -->
      <polyline points="420,60 400,140 430,140 405,230" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
      <polyline points="420,60 400,140 430,140 405,230" stroke="#fff" stroke-width="0.5" fill="none" opacity="0.4" stroke-linecap="round"/>

      <!-- Rolo de filme -->
      <g transform="translate(600, 100)" opacity="0.65">
        <circle cx="40" cy="40" r="40" fill="none" stroke="#ff6a9b" stroke-width="2"/>
        <circle cx="40" cy="40" r="15" fill="#1a0010" stroke="#ff6a9b" stroke-width="1.5"/>
        <circle cx="40" cy="8" r="5" fill="#ff6a9b" opacity="0.6"/>
        <circle cx="40" cy="72" r="5" fill="#ff6a9b" opacity="0.6"/>
        <circle cx="8" cy="40" r="5" fill="#ff6a9b" opacity="0.6"/>
        <circle cx="72" cy="40" r="5" fill="#ff6a9b" opacity="0.6"/>
        <!-- Tira de filme -->
        <rect x="80" y="20" width="60" height="42" rx="2" fill="#1a0010" stroke="#ff6a9b" stroke-width="1.2"/>
        <rect x="80" y="20" width="8" height="42" fill="#ff6a9b" opacity="0.15"/>
        <rect x="132" y="20" width="8" height="42" fill="#ff6a9b" opacity="0.15"/>
        <rect x="84" y="28" width="52" height="26" rx="1" fill="#2a0020" opacity="0.8"/>
      </g>

      <!-- Esferas flutuantes -->
      <circle cx="500" cy="80" r="18" fill="none" stroke="#7c6aff" stroke-width="1.5" opacity="0.5"/>
      <circle cx="500" cy="80" r="10" fill="#7c2bff" opacity="0.3"/>
      <circle cx="560" cy="50" r="10" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
      <circle cx="350" cy="90" r="14" fill="none" stroke="#ff6a9b" stroke-width="1.2" opacity="0.5"/>

      <!-- Personagem pulando (direita) -->
      <g opacity="0.55" transform="translate(700, 80) rotate(-15)">
        <ellipse cx="12" cy="0" rx="7" ry="8" fill="#0a1a4a"/>
        <rect x="6" y="8" width="12" height="26" rx="3" fill="#0a1a4a"/>
        <path d="M6 16 L-6 30" stroke="#0a1a4a" stroke-width="5" stroke-linecap="round"/>
        <path d="M18 16 L28 10" stroke="#0a1a4a" stroke-width="5" stroke-linecap="round"/>
        <path d="M8 34 L2 54" stroke="#0a1a4a" stroke-width="5" stroke-linecap="round"/>
        <path d="M16 34 L22 50" stroke="#0a1a4a" stroke-width="5" stroke-linecap="round"/>
      </g>

      <!-- Grupo silhuetas chão (esquerda) -->
      <g opacity="0.5" transform="translate(200, 220)">
        <!-- 4 figuras pequenas -->
        <g transform="translate(0,0)">
          <circle cx="10" cy="0" r="8" fill="#2a0a4a"/>
          <rect x="4" y="8" width="12" height="28" rx="3" fill="#2a0a4a"/>
          <rect x="5" y="36" width="5" height="18" rx="2" fill="#2a0a4a"/>
          <rect x="10" y="36" width="5" height="18" rx="2" fill="#2a0a4a"/>
        </g>
        <g transform="translate(30, 8)">
          <circle cx="10" cy="0" r="7" fill="#1a0a3a"/>
          <rect x="4" y="7" width="11" height="24" rx="3" fill="#1a0a3a"/>
          <rect x="5" y="31" width="4" height="16" rx="2" fill="#1a0a3a"/>
          <rect x="10" y="31" width="4" height="16" rx="2" fill="#1a0a3a"/>
        </g>
        <g transform="translate(58, -4)">
          <circle cx="10" cy="0" r="9" fill="#2a0a4a"/>
          <rect x="3" y="9" width="14" height="30" rx="3" fill="#2a0a4a"/>
          <rect x="5" y="39" width="5" height="18" rx="2" fill="#2a0a4a"/>
          <rect x="10" y="39" width="5" height="18" rx="2" fill="#2a0a4a"/>
        </g>
        <g transform="translate(90, 6)">
          <circle cx="9" cy="0" r="7" fill="#1a0a3a"/>
          <rect x="3" y="7" width="11" height="24" rx="3" fill="#1a0a3a"/>
          <rect x="4" y="31" width="4" height="15" rx="2" fill="#1a0a3a"/>
          <rect x="9" y="31" width="4" height="15" rx="2" fill="#1a0a3a"/>
        </g>
      </g>

      <!-- Filtros SVG -->
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>
  </div>

  <!-- Texto hero -->
  <div class="hero-content">
    <p class="hero-eyebrow">✦ Em destaque esta semana</p>
    <h2 class="hero-title">Explore reviews de<br><span>anime & mangá</span></h2>
  </div>
</section>

<!-- ══ MAIN ══ -->
<main>
  <div class="section-header">
    <h2 class="section-title">Feed</h2>
    <span class="section-count">128 reviews recentes</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="anime">Anime</button>
    <button class="filter-btn" data-filter="manga">Mangá</button>
    <button class="filter-btn" data-filter="filme">Filme</button>
  </div>

  <div class="feed-grid" id="feed-grid">
    <!-- Cards gerados via JS -->
  </div>
</main>

<script>
  /* ── Partículas no hero ── */
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${Math.random() * 20}px;
      animation-duration: ${4 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 6}s;
      opacity: ${0.3 + Math.random() * 0.5};
      width: ${1 + Math.random() * 2}px;
      height: ${1 + Math.random() * 2}px;
    `;
    container.appendChild(p);
  }

  /* ── Dados mockados ── */
  const reviews = [
    {
      title: "Haikyuu",
      badge: "manga",
      stars: 5,
      excerpt: "Você termina com uma vontade absurda de se tornar um jogador de vôlei, além de se sentir inspirado pelos personagens e suas jornadas.",
      user: "@han_yass20",
      time: "há 10 minutos",
      likes: 14,
      comments: 3,
      img: "./images/haikyuu.jpg"
    },
    {
      title: "Princess Mononoke",
      badge: "anime",
      stars: 5,
      excerpt: "A luta entre a civilização e a natureza nunca foi retratada com tanta beleza e nuance. Um épico que envelhece como um bom vinho.",
      user: "@ryo_san",
      time: "há 22 minutos",
      likes: 9,
      comments: 2,
      img: "./images/princesa.jpg"
    },
    {
      title: "Demon Slayer",
      badge: "anime",
      stars: 4,
      excerpt: "Impecável a forma como o anime é feito, ótima animação e uma ótima história, com personagens cativantes e um ritmo que mantém o espectador preso do início ao fim.",
      user: "@ana_k",
      time: "há 45 minutos",
      likes: 21,
      comments: 7,
      img: "./images/demon_slayer.jpg"
    },
    {
      title: "Your Name",
      badge: "anime",
      stars: 5,
      excerpt: "Uma história de amor e destino que transcende o tempo e o espaço. A animação é deslumbrante, e a trilha sonora de Radwimps é simplesmente perfeita.",
      user: "@shin_ji99",
      time: "há 1 hora",
      likes: 34,
      comments: 12,
      img: "./images/you_name.jpg"
    },
    {
      title: "Ao Haru Ride",
      badge: "manga",
      stars: 4,
      excerpt: "Uma doce e melancólica história de amor adolescente que captura perfeitamente as emoções confusas da juventude.",
      user: "@deku_fan",
      time: "há 2 horas",
      likes: 18,
      comments: 5,
      img: "./images/haru_ride.jpg"
    },
    {
      title: "Attack on Titan",
      badge: "anime",
      stars: 5,
      excerpt: "Uma narrativa que começa como ação pura e se transforma em algo muito mais complexo e filosófico. Um dos maiores finais da história do anime.",
      user: "@eren_yager",
      time: "há 3 horas",
      likes: 52,
      comments: 18,
      img: "./images/aot.jpg"
    }
  ];

  /* ── Renderizar cards ── */
  function renderStars(count) {
    return Array.from({ length: 5 }, (_, i) =>
      `<span class="star${i >= count ? ' half' : ''}">★</span>`
    ).join('');
  }

  function renderCards(data) {
    const grid = document.getElementById('feed-grid');
    grid.innerHTML = data.map(r => `
      <article class="card" data-cat="${r.badge}">
        <div class="card-thumb">
          <img src="${r.img}" alt="${r.title}" loading="lazy">
          <span class="card-badge ${r.badge}">${r.badge}</span>
        </div>
        <div class="card-body">
          <div class="stars">${renderStars(r.stars)}</div>
          <h3 class="card-title">${r.title}</h3>
          <p class="card-excerpt">${r.excerpt}</p>
          <div class="card-footer">
            <span class="card-user"><strong>${r.user}</strong> · ${r.time}</span>
            <div class="card-stats">
              <span class="stat like">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                ${r.likes}
              </span>
              <span class="stat comment">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                ${r.comments}
              </span>
            </div>
          </div>
        </div>
      </article>
    `).join('');
  }

  renderCards(reviews);

  /* ── Filtros ── */
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.dataset.filter;
      const filtered = filter === 'all' ? reviews : reviews.filter(r => r.badge === filter);
      renderCards(filtered);
    });
  });
</script>

</body>
</html>
